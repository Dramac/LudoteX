# Reverse proxy nginx pour l'INSTANCE DE FORMATION (voir docs/mode-formation.md).
#
# Même principe que nginx-ludotex.conf, sur un SOUS-DOMAINE dédié (jamais un
# préfixe de chemin : les liens absolus des gabarits casseraient) et pointant
# vers le port de l'instance de formation (127.0.0.1:8100, voir
# deploy/ludotex-formation.service).
#
# Installation : voir l'étape optionnelle « site de formation » de
# deploy/install.sh, ou la section correspondante de docs/deploiement.md.

server {
    listen 80;
    listen [::]:80;
    server_name formation.pret.example.fr;    # <-- À REMPLACER

    client_max_body_size 5m;

    # Mêmes fichiers statiques que la production (même code).
    location /static/ {
        alias /opt/ludotex/app/static/;       # <-- adapter le chemin si besoin
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
