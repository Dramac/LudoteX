# Reverse proxy nginx pour l'application de prêt de jeux.
#
# Installation :
#   sudo cp deploy/nginx-pret-jeux.conf /etc/nginx/sites-available/pret-jeux
#   # remplacer pret.example.fr par le vrai sous-domaine, et le chemin /opt/pret-jeux si besoin
#   sudo ln -s /etc/nginx/sites-available/pret-jeux /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   # puis obtenir le certificat (ajoute automatiquement le bloc HTTPS + la redirection) :
#   sudo certbot --nginx -d pret.example.fr
#
# certbot duplique ce bloc en écoute 443 (TLS) et ajoute la redirection 80->443 ;
# les `location` ci-dessous (static + proxy) sont conservés.

server {
    listen 80;
    listen [::]:80;
    server_name pret.example.fr;          # <-- À REMPLACER

    # Taille max d'un envoi (les imports CSV se font en ligne de commande, pas via le web).
    client_max_body_size 5m;

    # Fichiers statiques servis directement par nginx (CSS, JS du scanner, logo).
    location /static/ {
        alias /opt/pret-jeux/app/static/;   # <-- adapter le chemin si besoin
        access_log off;
        expires 7d;
    }

    # Tout le reste est transmis à uvicorn (écoute locale 127.0.0.1:8000).
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # => HTTPS vu par l'app (cookies Secure)
    }
}
