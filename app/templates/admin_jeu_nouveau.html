{% extends "base.html" %}
{% block titre %}Administration — nouveau jeu{% endblock %}

{% block contenu %}
<section class="carte">
  <h1>Créer une fiche de jeu</h1>
  <p><a class="lien" href="/admin">← Tableau de bord</a></p>

  {% if erreur %}<p class="resultat resultat-attention">{{ erreur }}</p>{% endif %}

  <form method="post" action="/admin/jeu-nouveau" class="recherche-form">
    <div class="champ">
      <label for="nom">Nom du jeu *</label>
      <input type="text" id="nom" name="nom" required autofocus>
    </div>
    <div class="champ">
      <label for="categorie">Catégorie</label>
      <input type="text" id="categorie" name="categorie" placeholder="ex. Cartes, Ambiance">
    </div>
    <div class="champ">
      <label for="nb_joueurs_min">Joueurs minimum</label>
      <input type="number" id="nb_joueurs_min" name="nb_joueurs_min" min="1">
    </div>
    <div class="champ">
      <label for="nb_joueurs_max">Joueurs maximum</label>
      <input type="number" id="nb_joueurs_max" name="nb_joueurs_max" min="1">
    </div>
    <div class="champ">
      <label for="duree_min">Durée (minutes)</label>
      <input type="number" id="duree_min" name="duree_min" min="1">
    </div>
    <div class="champ">
      <label for="age_min">Âge minimum</label>
      <input type="number" id="age_min" name="age_min" min="0">
    </div>
    <div class="champ">
      <label for="editeur">Éditeur</label>
      <input type="text" id="editeur" name="editeur">
    </div>
    <div class="champ">
      <label for="auteur">Auteur</label>
      <input type="text" id="auteur" name="auteur">
    </div>
    <div class="champ">
      <label for="annee_edition">Année d'édition</label>
      <input type="number" id="annee_edition" name="annee_edition" min="1900" max="2100">
    </div>
    <div class="champ">
      <label for="descriptif">Descriptif</label>
      <textarea id="descriptif" name="descriptif" rows="3"></textarea>
    </div>
    <div><button type="submit" class="bouton-filtrer">Créer le jeu</button></div>
  </form>
  <p class="stats-note">Un identifiant d'exemplaire et son étiquette seront générés automatiquement.</p>
</section>
{% endblock %}
